<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Brand Film — Eaden Ai Creator</title>
  <meta name="description" content="Eaden Ai Creator의 브랜드 필름 포트폴리오"/>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Noto+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/gh/moonspam/NanumSquare@2.0/nanumsquare.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --surface: #001427;
      --surface-container-low: #081d30;
      --surface-container: #0c2134;
      --primary: #e8caa1;
      --on-surface: #d1e4fe;
      --outline-variant: #4d463c;
      --font-headline: 'NanumSquare', sans-serif;
      --font-body: 'NanumSquare', sans-serif;
      --transition-liquid: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 16px; }

    body {
      background-color: var(--surface);
      color: var(--on-surface);
      font-family: var(--font-body);
      font-weight: 700;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--surface); }
    ::-webkit-scrollbar-thumb { background: var(--outline-variant); border-radius: 3px; }

    /* ── HEADER ── */
    .page-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(0, 20, 39, 0.8);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border-bottom: 1px solid rgba(77, 70, 60, 0.12);
    }

    .page-header__inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 1.1rem 3rem;
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      background: none;
      border: none;
      color: rgba(209, 228, 254, 0.5);
      font-family: var(--font-body);
      font-size: 0.68rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: color var(--transition-liquid);
    }
    .back-btn:hover { color: var(--primary); }

    .header-divider { width: 1px; height: 18px; background: rgba(77, 70, 60, 0.4); }

    .header-logo {
      font-family: var(--font-headline);
      font-size: 0.82rem;
      letter-spacing: 0.35em;
      color: var(--primary);
      text-decoration: none;
      font-weight: 400;
    }

    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .header-right-line { width: 28px; height: 1px; background: var(--primary); }

    .header-right-title {
      font-size: 0.72rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--primary);
    }

    /* ── HERO ── */
    .page-hero {
      padding: 4.5rem 3rem 3rem;
      max-width: 1280px;
      margin: 0 auto;
    }

    .hero-label {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0.9rem;
    }

    .hero-label-line { width: 44px; height: 1px; background: var(--primary); }

    .hero-label-text {
      font-size: 0.68rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--primary);
    }

    .hero-title {
      font-family: var(--font-headline);
      font-size: clamp(2.6rem, 5.5vw, 4.5rem);
      color: var(--on-surface);
      line-height: 1.1;
    }

    .hero-title em { color: var(--primary); font-style: italic; }

    .hero-desc {
      margin-top: 1.2rem;
      font-size: 0.92rem;
      color: rgba(209, 228, 254, 0.5);
      font-weight: 300;
      line-height: 1.8;
      max-width: 480px;
    }

    /* ── VIDEO GRID ── */
    .video-section {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 3rem 7rem;
    }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
    }

    /* ── VIDEO CARD ── */
    .video-card {
      border-radius: 4px;
      overflow: hidden;
      background: var(--surface-container-low);
    }

    /* iframe wrapper — keeps 16:9 ratio */
    .video-card__embed {
      position: relative;
      aspect-ratio: 16 / 9;
      background: #000;
    }

    .video-card__iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .video-card__info {
      padding: 1rem 1.25rem 1.3rem;
      border-top: 1px solid rgba(77, 70, 60, 0.1);
    }

    .video-card__category {
      font-size: 0.57rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--primary);
      opacity: 0.62;
      margin-bottom: 0.3rem;
    }

    .video-card__title {
      font-family: var(--font-headline);
      font-size: 0.9rem;
      color: var(--on-surface);
      font-weight: 700;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── FOOTER ── */
    .page-footer {
      border-top: 1px solid rgba(77, 70, 60, 0.1);
      max-width: 1280px;
      margin: 0 auto;
      padding: 2.5rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .page-footer__logo {
      font-family: var(--font-headline);
      font-size: 0.88rem;
      letter-spacing: 0.3em;
      color: var(--primary);
      opacity: 0.4;
    }

    .page-footer__copy {
      font-size: 0.58rem;
      letter-spacing: 0.12em;
      color: rgba(209, 228, 254, 0.15);
    }

    /* ── FADE IN ── */
    .fade-in {
      opacity: 0;
      transform: translateY(22px);
      transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1),
                  transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .fade-in.visible { opacity: 1; transform: translateY(0); }

    /* ── RESPONSIVE ── */
    @media (max-width: 1024px) {
      .video-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 768px) {
      .page-header__inner { padding: 1rem 1.5rem; }
      .header-right { display: none; }
      .page-hero { padding: 3rem 1.5rem 2rem; }
      .video-section { padding: 0 1.5rem 4rem; }
      .video-grid { grid-template-columns: 1fr; }
      .page-footer { padding: 2rem 1.5rem; flex-direction: column; gap: 1rem; text-align: center; }
    }
  </style>
</head>
<body>

  <!-- ── HEADER ── -->
  <header class="page-header">
    <div class="page-header__inner">
      <button class="back-btn" onclick="goBack()">
        <span class="material-symbols-outlined" style="font-size:14px;">arrow_back</span>
        Back
      </button>
      <div class="header-divider"></div>
      <a class="header-logo" href="index.html">EADEN</a>
      <div class="header-right">
        <div class="header-right-line"></div>
        <span class="header-right-title">Brand Film</span>
      </div>
    </div>
  </header>

  <!-- ── HERO ── -->
  <div class="page-hero">
    <div class="hero-label fade-in">
      <div class="hero-label-line"></div>
      <span class="hero-label-text">Portfolio</span>
    </div>
    <h1 class="hero-title fade-in" style="transition-delay:.08s;">
      Brand <em>Film</em>
    </h1>
    <p class="hero-desc fade-in" style="transition-delay:.18s;">
      브랜드의 철학과 감각을 영상으로 설계합니다.<br/>
      몰입에서 이완으로 이어지는 정서적 경험.
    </p>
  </div>

  <!-- ── VIDEO GRID (built by JS) ── -->
  <section class="video-section">
    <div class="video-grid" id="videoGrid"></div>
  </section>

  <!-- ── FOOTER ── -->
  <footer>
    <div class="page-footer">
      <span class="page-footer__logo">EADEN</span>
      <span class="page-footer__copy">© 2026 Eaden Ai Creator. All rights reserved.</span>
    </div>
  </footer>

  <script>
    const videos = [
      { id: 'oItUgcCpjEQ',  title: '파인프라 소개 동영상' },
      { id: 'NmywD2ploqc',  title: '경기관광공사 ICE' },
      { id: '99OuAsRCE40',  title: 'The Uninvited at the Table' },
      { id: 'YNmVJVgsq0w',  title: '네온 에덴 : 디지털 크로마' },
      { id: 'LOqUFL24mrM',  title: '경기 미스터리: 숨은 코드를 찾아서 4K' },
      { id: 'V97XsOyKUj0',  title: '4k 시간 속의 고요: 잔잔한 고찰' }
    ];

    const grid = document.getElementById('videoGrid');

    videos.forEach((v, i) => {
      const card = document.createElement('div');
      card.className = 'video-card fade-in';
      card.style.transitionDelay = `${i * 0.08}s`;
      card.innerHTML = `
        <div class="video-card__embed">
          <iframe
            class="video-card__iframe"
            src="https://www.youtube.com/embed/${v.id}?rel=0"
            title="${v.title}"
            frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            allowfullscreen
            loading="lazy"
          ></iframe>
        </div>
        <div class="video-card__info">
          <p class="video-card__category">Brand Film</p>
          <h2 class="video-card__title">${v.title}</h2>
        </div>
      `;
      grid.appendChild(card);
    });

    // Fade-in
    const observer = new IntersectionObserver(
      entries => entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); }),
      { threshold: 0.08 }
    );
    document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));

    function goBack() {
      if (document.referrer && document.referrer.includes(location.hostname)) {
        history.back();
      } else {
        location.href = 'index.html';
      }
    }
  </script>
</body>
</html>
