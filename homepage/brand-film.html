<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Brand Film — Eaden Ai Creator</title>
  <meta name="description" content="Eaden Ai Creator의 브랜드 필름 포트폴리오"/>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Noto+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/gh/moonspam/NanumSquare@2.0/nanumsquare.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --surface: #001427;
      --surface-container-lowest: #000f1f;
      --surface-container-low: #081d30;
      --surface-container: #0c2134;
      --surface-container-high: #182b3f;
      --surface-container-highest: #23364a;
      --primary: #e8caa1;
      --primary-container: #cbaf87;
      --on-primary: #3f2d10;
      --on-surface: #d1e4fe;
      --on-surface-variant: #d0c5b8;
      --outline: #998f83;
      --outline-variant: #4d463c;
      --font-headline: 'NanumSquare', sans-serif;
      --font-body: 'NanumSquare', sans-serif;
      --transition-liquid: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 16px; }

    body {
      background-color: var(--surface);
      color: var(--on-surface);
      font-family: var(--font-body);
      font-weight: 700;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--surface); }
    ::-webkit-scrollbar-thumb { background: var(--outline-variant); border-radius: 3px; }

    /* ── HEADER ── */
    .page-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(0, 20, 39, 0.75);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border-bottom: 1px solid rgba(77, 70, 60, 0.12);
    }

    .page-header__inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 1.2rem 3rem;
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      background: none;
      border: none;
      color: rgba(209, 228, 254, 0.55);
      font-family: var(--font-body);
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 0.5rem 0;
      transition: color var(--transition-liquid);
    }
    .back-btn:hover { color: var(--primary); }

    .header-divider { width: 1px; height: 20px; background: rgba(77, 70, 60, 0.4); }

    .header-logo {
      font-family: var(--font-headline);
      font-size: 0.85rem;
      letter-spacing: 0.35em;
      color: var(--primary);
      text-decoration: none;
      font-weight: 400;
    }

    .header-title-wrap {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .header-label-line { width: 32px; height: 1px; background: var(--primary); }

    .header-title {
      font-family: var(--font-headline);
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--primary);
    }

    /* ── HERO STRIP ── */
    .page-hero {
      padding: 5rem 3rem 3.5rem;
      max-width: 1280px;
      margin: 0 auto;
    }

    .page-hero__label {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .page-hero__label-line { width: 48px; height: 1px; background: var(--primary); }

    .page-hero__label-text {
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--primary);
    }

    .page-hero__title {
      font-family: var(--font-headline);
      font-size: clamp(2.8rem, 6vw, 5rem);
      color: var(--on-surface);
      letter-spacing: 0.02em;
      line-height: 1.1;
    }

    .page-hero__title em { color: var(--primary); font-style: italic; }

    .page-hero__desc {
      margin-top: 1.5rem;
      font-size: 0.95rem;
      color: rgba(209, 228, 254, 0.55);
      font-weight: 300;
      line-height: 1.8;
      max-width: 520px;
    }

    /* ── VIDEO GRID ── */
    .video-section {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 3rem 8rem;
    }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.75rem;
    }

    /* ── VIDEO CARD ── */
    .video-card {
      position: relative;
      cursor: pointer;
      border-radius: 4px;
      overflow: hidden;
      background: var(--surface-container-low);
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .video-card:hover { transform: translateY(-4px); }

    .video-card__thumb {
      position: relative;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      background: var(--surface-container);
    }

    .video-card__thumb-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: grayscale(0.55) brightness(0.88);
      transition: filter 0.7s ease, transform 0.9s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .video-card:hover .video-card__thumb-img {
      filter: grayscale(0) brightness(1);
      transform: scale(1.04);
    }

    .video-card__overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(160deg, rgba(0,20,39,0.12) 0%, rgba(0,20,39,0.42) 100%);
      transition: background 0.5s ease;
    }

    .video-card:hover .video-card__overlay { background: rgba(0,20,39,0.08); }

    .video-card__play {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.75);
      width: 60px;
      height: 60px;
      background: rgba(0, 15, 31, 0.65);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
      opacity: 0;
      transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      border: 1px solid rgba(232, 202, 161, 0.25);
    }

    .video-card:hover .video-card__play {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    .video-card__num {
      position: absolute;
      top: 0.85rem;
      left: 0.85rem;
      font-size: 0.58rem;
      letter-spacing: 0.18em;
      color: rgba(209, 228, 254, 0.4);
      background: rgba(0, 20, 39, 0.55);
      backdrop-filter: blur(6px);
      padding: 0.25rem 0.55rem;
      border-radius: 2px;
    }

    .video-card__info {
      padding: 1.1rem 1.25rem 1.35rem;
      background: var(--surface-container-low);
      border-top: 1px solid rgba(77, 70, 60, 0.1);
    }

    .video-card__category {
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--primary);
      opacity: 0.65;
      margin-bottom: 0.35rem;
    }

    .video-card__title {
      font-family: var(--font-headline);
      font-size: 0.95rem;
      color: var(--on-surface);
      font-weight: 700;
      line-height: 1.35;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── PLAYER MODAL ── */
    .player-modal {
      position: fixed;
      inset: 0;
      z-index: 5000;
      background: rgba(0, 10, 20, 0.97);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.42s cubic-bezier(0.4, 0, 0.2, 1),
                  visibility 0.42s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .player-modal.open { opacity: 1; visibility: visible; }

    .player-modal__close {
      position: absolute;
      top: 1.75rem;
      right: 1.75rem;
      background: rgba(0, 20, 39, 0.6);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(77, 70, 60, 0.2);
      border-radius: 50%;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
      cursor: pointer;
      transition: background 0.3s ease, border-color 0.3s ease;
      z-index: 10;
    }

    .player-modal__close:hover {
      background: rgba(0, 20, 39, 0.9);
      border-color: rgba(232, 202, 161, 0.3);
    }

    .player-modal__inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      transform: scale(0.94) translateY(14px);
      transition: transform 0.42s cubic-bezier(0.34, 1.2, 0.64, 1);
    }

    .player-modal.open .player-modal__inner { transform: scale(1) translateY(0); }

    /* Landscape (16:9) wrapper */
    .player-modal__iframe-wrap {
      position: relative;
      background: #000;
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 28px 80px rgba(0, 10, 20, 0.85);
    }

    .player-modal__iframe-wrap.is-landscape {
      width: 88vw;
      max-width: 1000px;
      aspect-ratio: 16 / 9;
    }

    /* Portrait / Shorts (9:16) wrapper */
    .player-modal__iframe-wrap.is-portrait {
      height: 82vh;
      max-height: 700px;
      aspect-ratio: 9 / 16;
    }

    .player-modal__iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    .player-modal__meta {
      display: flex;
      align-items: baseline;
      gap: 1rem;
      width: 100%;
      max-width: 1000px;
      padding: 0 0.25rem;
    }

    .player-modal__index {
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      color: rgba(209, 228, 254, 0.28);
      flex-shrink: 0;
    }

    .player-modal__title {
      font-family: var(--font-headline);
      font-size: 1.15rem;
      color: var(--on-surface);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .player-modal__cat {
      margin-left: auto;
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--primary);
      opacity: 0.65;
      flex-shrink: 0;
    }

    /* ── FOOTER ── */
    .page-footer {
      border-top: 1px solid rgba(77, 70, 60, 0.1);
      max-width: 1280px;
      margin: 0 auto;
      padding: 2.5rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .page-footer__logo {
      font-family: var(--font-headline);
      font-size: 0.9rem;
      letter-spacing: 0.3em;
      color: var(--primary);
      opacity: 0.45;
    }

    .page-footer__copy {
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      color: rgba(209, 228, 254, 0.18);
    }

    /* ── FADE IN ── */
    .fade-in {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.85s cubic-bezier(0.4, 0, 0.2, 1),
                  transform 0.85s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .fade-in.visible { opacity: 1; transform: translateY(0); }

    .s1 { transition-delay: 0.04s; }
    .s2 { transition-delay: 0.12s; }
    .s3 { transition-delay: 0.20s; }
    .s4 { transition-delay: 0.28s; }
    .s5 { transition-delay: 0.36s; }
    .s6 { transition-delay: 0.44s; }

    /* ── RESPONSIVE ── */
    @media (max-width: 1024px) {
      .video-grid { grid-template-columns: repeat(2, 1fr); gap: 1.5rem; }
    }

    @media (max-width: 768px) {
      .page-header__inner { padding: 1rem 1.5rem; }
      .header-title-wrap { display: none; }
      .page-hero { padding: 3.5rem 1.5rem 2.5rem; }
      .video-section { padding: 0 1.5rem 5rem; }
      .video-grid { grid-template-columns: 1fr; }
      .player-modal__iframe-wrap.is-landscape { width: 95vw; }
      .player-modal__iframe-wrap.is-portrait { height: 75vh; }
      .page-footer { padding: 2rem 1.5rem; flex-direction: column; gap: 1rem; text-align: center; }
    }
  </style>
</head>
<body>

  <!-- ── HEADER ── -->
  <header class="page-header">
    <div class="page-header__inner">
      <button class="back-btn" onclick="goBack()">
        <span class="material-symbols-outlined" style="font-size:15px;">arrow_back</span>
        Back
      </button>
      <div class="header-divider"></div>
      <a class="header-logo" href="index.html">EADEN</a>
      <div class="header-title-wrap">
        <div class="header-label-line"></div>
        <span class="header-title">Brand Film</span>
      </div>
    </div>
  </header>

  <!-- ── HERO STRIP ── -->
  <div class="page-hero">
    <div class="page-hero__label fade-in">
      <div class="page-hero__label-line"></div>
      <span class="page-hero__label-text">Portfolio</span>
    </div>
    <h1 class="page-hero__title fade-in" style="transition-delay:.1s;">
      Brand <em>Film</em>
    </h1>
    <p class="page-hero__desc fade-in" style="transition-delay:.2s;">
      브랜드의 철학과 감각을 영상으로 설계합니다.<br/>
      몰입에서 이완으로 이어지는 정서적 경험.
    </p>
  </div>

  <!-- ── VIDEO GRID ── -->
  <section class="video-section">
    <div class="video-grid" id="videoGrid"></div>
  </section>

  <!-- ── FOOTER ── -->
  <footer>
    <div class="page-footer">
      <span class="page-footer__logo">EADEN</span>
      <span class="page-footer__copy">© 2026 Eaden Ai Creator. All rights reserved.</span>
    </div>
  </footer>

  <!-- ── PLAYER MODAL ── -->
  <div class="player-modal" id="playerModal">
    <button class="player-modal__close" id="playerClose" aria-label="닫기">
      <span class="material-symbols-outlined">close</span>
    </button>
    <div class="player-modal__inner">
      <div class="player-modal__iframe-wrap" id="iframeWrap">
        <iframe
          class="player-modal__iframe"
          id="playerIframe"
          src=""
          allow="autoplay; encrypted-media; fullscreen"
          allowfullscreen
        ></iframe>
      </div>
      <div class="player-modal__meta">
        <span class="player-modal__index" id="playerIndex"></span>
        <h2 class="player-modal__title" id="playerTitle"></h2>
        <span class="player-modal__cat">Brand Film</span>
      </div>
    </div>
  </div>

  <script>
    // ── Brand Film YouTube data ──
    const videos = [
      { id: 'oItUgcCpjEQ',  title: '파인프라 소개 동영상',                isShorts: true  },
      { id: 'NmywD2ploqc',  title: '경기관광공사 ICE',                    isShorts: true  },
      { id: '99OuAsRCE40',  title: 'The Uninvited at the Table',         isShorts: false },
      { id: 'YNmVJVgsq0w',  title: '네온 에덴 : 디지털 크로마',           isShorts: false },
      { id: 'LOqUFL24mrM',  title: '경기 미스터리: 숨은 코드를 찾아서 4K', isShorts: false },
      { id: 'V97XsOyKUj0',  title: '4k 시간 속의 고요: 잔잔한 고찰',     isShorts: false }
    ];

    const staggerClasses = ['s1','s2','s3','s4','s5','s6'];

    // ── Build grid ──
    const grid = document.getElementById('videoGrid');
    videos.forEach((v, i) => {
      const thumbUrl = `https://img.youtube.com/vi/${v.id}/maxresdefault.jpg`;
      const fallback  = `https://img.youtube.com/vi/${v.id}/hqdefault.jpg`;
      const card = document.createElement('div');
      card.className = `video-card fade-in ${staggerClasses[i]}`;
      card.onclick = () => openPlayer(i);
      card.innerHTML = `
        <div class="video-card__thumb">
          <img
            class="video-card__thumb-img"
            src="${thumbUrl}"
            alt="${v.title}"
            loading="lazy"
            onerror="this.onerror=null;this.src='${fallback}'"
          />
          <div class="video-card__overlay"></div>
          <div class="video-card__play">
            <span class="material-symbols-outlined" style="font-size:28px;">play_arrow</span>
          </div>
          <span class="video-card__num">0${i+1} / 0${videos.length}</span>
        </div>
        <div class="video-card__info">
          <p class="video-card__category">Brand Film</p>
          <h2 class="video-card__title">${v.title}</h2>
        </div>
      `;
      grid.appendChild(card);
    });

    // ── Fade-in observer ──
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.1, rootMargin: '0px 0px -20px 0px' });

    document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));

    // ── Player modal ──
    const modal     = document.getElementById('playerModal');
    const iframe    = document.getElementById('playerIframe');
    const iframeWrap = document.getElementById('iframeWrap');
    const titleEl   = document.getElementById('playerTitle');
    const indexEl   = document.getElementById('playerIndex');

    function openPlayer(i) {
      const v = videos[i];
      iframe.src = `https://www.youtube.com/embed/${v.id}?autoplay=1&rel=0&modestbranding=1&playsinline=1`;
      titleEl.textContent = v.title;
      indexEl.textContent = `0${i+1} / 0${videos.length}`;
      iframeWrap.className = `player-modal__iframe-wrap ${v.isShorts ? 'is-portrait' : 'is-landscape'}`;
      modal.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closePlayer() {
      modal.classList.remove('open');
      document.body.style.overflow = '';
      iframe.src = '';
    }

    document.getElementById('playerClose').addEventListener('click', closePlayer);
    modal.addEventListener('click', e => { if (e.target === modal) closePlayer(); });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && modal.classList.contains('open')) closePlayer();
    });

    // ── Back navigation ──
    function goBack() {
      if (document.referrer && document.referrer.includes(location.hostname)) {
        history.back();
      } else {
        location.href = 'index.html';
      }
    }
  </script>
</body>
</html>
