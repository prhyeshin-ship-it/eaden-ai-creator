<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eaden - Admin Dashboard</title>
  <link href="https://cdn.jsdelivr.net/gh/moonspam/NanumSquare@2.0/nanumsquare.css" rel="stylesheet">
  <style>
    :root {
      --bg: #000a14;
      --surface: #0a192f;
      --text: #d1e4fe;
      --primary: #c29b6f;
      --border: rgba(194, 155, 111, 0.3);
    }
    body {
      font-family: 'NanumSquare', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 2rem;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 {
      color: var(--primary);
      text-align: center;
      margin-bottom: 2rem;
    }
    .auth-card {
      background: var(--surface);
      padding: 2rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      max-width: 400px;
      margin: 4rem auto;
      text-align: center;
    }
    input[type="password"] {
      width: calc(100% - 2rem);
      padding: 0.8rem;
      margin-bottom: 1rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      color: white;
      border-radius: 4px;
    }
    button {
      background: var(--primary);
      color: #000;
      border: none;
      padding: 0.8rem 2rem;
      cursor: pointer;
      font-weight: bold;
      border-radius: 4px;
      transition: opacity 0.2s;
    }
    button:hover {
      opacity: 0.8;
    }
    #dashboard {
      display: none;
    }
    .error {
      color: #ff6b6b;
      margin-top: 1rem;
      font-size: 0.9rem;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 2rem;
      background: var(--surface);
      border-radius: 8px;
      overflow: hidden;
    }
    th, td {
      padding: 1rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    th {
      background: rgba(194, 155, 111, 0.1);
      color: var(--primary);
      white-space: nowrap;
    }
    tr:hover {
      background: rgba(255, 255, 255, 0.05);
    }
    .empty {
      padding: 2rem;
      text-align: center;
      color: rgba(209, 228, 254, 0.6);
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Eaden Admin Hub</h1>

    <div class="auth-card" id="authSection">
      <h3>관리자 로그인</h3>
      <p style="font-size: 0.9rem; margin-bottom: 1.5rem; color: rgba(209, 228, 254, 0.7);">접속 비밀번호를 입력해주세요.</p>
      <form id="authForm">
        <input type="password" id="passwordInput" placeholder="Password" required>
        <button type="submit">확인</button>
      </form>
      <div id="authError" class="error"></div>
    </div>

    <div id="dashboard">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <h2>고객 문의 내역</h2>
        <button onclick="fetchInquiries()" style="padding: 0.5rem 1rem;">새로고침</button>
      </div>
      
      <table>
        <thead>
          <tr>
            <th>날짜</th>
            <th>문의 유형</th>
            <th>이름</th>
            <th>연락처</th>
            <th>메시지</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <!-- Rows will be injected here -->
        </tbody>
      </table>
    </div>
  </div>

  <script>
    let currentPassword = '';

    document.getElementById('authForm').addEventListener('submit', (e) => {
      e.preventDefault();
      currentPassword = document.getElementById('passwordInput').value;
      fetchInquiries();
    });

    async function fetchInquiries() {
      const errorDiv = document.getElementById('authError');
      const tableBody = document.getElementById('tableBody');
      const authSection = document.getElementById('authSection');
      const dashboard = document.getElementById('dashboard');

      errorDiv.textContent = '불러오는 중...';
      
      try {
        const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.protocol === 'file:';
        const apiUrl = isLocal ? '/api/admin' : '/api/admin'; // Vercel 환경 기본값

        let data = {};
        
        try {
          const res = await fetch(apiUrl, {
            headers: {
              'Authorization': `Bearer ${currentPassword}`
            }
          });

          if (res.status === 401) {
            errorDiv.textContent = '비밀번호가 일치하지 않습니다.';
            return;
          }

          if (!res.ok) {
            throw new Error('서버 오류가 발생했습니다.');
          }

          data = await res.json();
        } catch (err) {
          // 서버 연결 실패 시 브라우저 수첩(localStorage)에서 데이터 꺼내오기!
          console.log("서버를 찾을 수 없어 브라우저 임시 저장소에서 불러옵니다.");
          data = {
            submissions: JSON.parse(localStorage.getItem('eaden_inquiries') || '[]')
          };
        }
        
        // Success
        authSection.style.display = 'none';
        dashboard.style.display = 'block';
        
        tableBody.innerHTML = '';
        if (!data.submissions || data.submissions.length === 0) {
          tableBody.innerHTML = `<tr><td colspan="5" class="empty">접수된 문의가 없습니다.</td></tr>`;
          return;
        }

        data.submissions.forEach(sub => {
          const tr = document.createElement('tr');
          const date = new Date(sub.created_at).toLocaleString('ko-KR');
          // Escape HTML gently to prevent XSS from messages
          const safeMessage = sub.message.replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\\n/g, '<br>');
          
          tr.innerHTML = `
            <td style="white-space: nowrap;">${date}</td>
            <td style="white-space: nowrap; color: var(--primary);">${sub.inquiry_type}</td>
            <td style="white-space: nowrap;">${sub.name}</td>
            <td style="white-space: nowrap;">${sub.contact}</td>
            <td style="line-height: 1.6;">${safeMessage}</td>
          `;
          tableBody.appendChild(tr);
        });

      } catch (err) {
        errorDiv.textContent = err.message || '데이터를 불러오지 못했습니다.';
      }
    }
  </script>
</body>
</html>
